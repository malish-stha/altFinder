server.port=8080

# Spring Datasource (Supabase Postgres)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable SQL formatting for cleaner console logs
spring.jpa.properties.hibernate.format_sql=true

# Clerk OAuth2 Resource Server JWKS endpoint (JWT verification)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI}

# Gemini API Key configuration
gemini.api.key=${GEMINI_API_KEY}

# Default Active Profile
spring.profiles.active=local

# CORS Allowed Origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}


