server.port=8080

# Spring Datasource (Supabase Postgres)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable SQL formatting for cleaner console logs
spring.jpa.properties.hibernate.format_sql=true

# Clerk OAuth2 Resource Server JWKS endpoint (JWT verification)
# For production, this should be set to your Clerk Frontend API JWKS URL:
# e.g., https://clerk.yourdomain.com/.well-known/jwks.json or your Clerk Dev URI
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI:https://api.clerk.com/v1/jwks}
